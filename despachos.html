<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Despachos - La Zapatería</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#dbeafe;--danger:#ef4444;--danger-dark:#dc2626;--success:#22c55e;--success-dark:#16a34a;--warning:#f59e0b;--warning-light:#fef3c7;--info:#0ea5e9;--purple:#8b5cf6;--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);--shadow-lg:0 10px 25px rgba(0,0,0,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:16px}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:linear-gradient(135deg,#1e293b 0%,#334155 100%);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow-lg)}
.topbar .brand{display:flex;align-items:center;gap:12px;color:#fff}
.topbar .brand .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.topbar .brand h1{font-size:16px;font-weight:800;letter-spacing:-.3px}
.topbar .brand .sub{font-size:11px;color:#94a3b8;font-weight:500}
.topbar .actions{display:flex;align-items:center;gap:10px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(255,255,255,.1);color:#e2e8f0;border:1px solid rgba(255,255,255,.1)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.35)}
.btn-success{background:linear-gradient(135deg,var(--success),var(--success-dark));color:#fff;box-shadow:0 2px 8px rgba(34,197,94,.25)}
.btn-success:hover:not(:disabled){transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,var(--danger),var(--danger-dark));color:#fff}
.btn-warning{background:linear-gradient(135deg,var(--warning),#d97706);color:#fff}
.btn-secondary{background:#f1f5f9;color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:#e2e8f0}
.btn-ghost{background:transparent;color:var(--muted);padding:8px 12px}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:6px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.card-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.card-title i{color:var(--primary)}

.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:12px;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-icon.blue{background:var(--primary-light);color:var(--primary)}
.stat-icon.green{background:rgba(34,197,94,.1);color:var(--success)}
.stat-icon.red{background:rgba(239,68,68,.1);color:var(--danger)}
.stat-icon.orange{background:rgba(245,158,11,.1);color:var(--warning)}
.stat-icon.purple{background:rgba(139,92,246,.1);color:var(--purple)}
.stat-label{font-size:11px;color:var(--muted);font-weight:500}
.stat-value{font-size:20px;font-weight:800;color:var(--text)}

.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.chip.ok{background:rgba(34,197,94,.1);color:#16a34a}
.chip.danger{background:rgba(239,68,68,.1);color:#dc2626}
.chip.warning{background:rgba(245,158,11,.1);color:#d97706}
.chip.info{background:rgba(14,165,233,.1);color:#0284c7}
.chip.purple{background:rgba(139,92,246,.1);color:#7c3aed}
.chip.neutral{background:var(--bg);color:var(--muted)}

.filters-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.filters-bar .form-input{padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s}
.filters-bar .form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.filters-bar select{cursor:pointer}

.tab-bar{display:flex;gap:4px;background:var(--card);padding:4px;border-radius:12px;border:1px solid var(--border);margin-bottom:16px;box-shadow:var(--shadow)}
.tab-btn{padding:10px 20px;border:none;border-radius:8px;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab-btn:hover{background:var(--bg);color:var(--text)}
.tab-btn.active{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.tab-btn .count{background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.tab-btn:not(.active) .count{background:var(--bg);color:var(--muted)}

.dispatch-grid{display:grid;gap:12px}

.order-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s;position:relative;overflow:hidden}
.order-card:hover{border-color:var(--primary);box-shadow:0 4px 12px rgba(37,99,235,.08)}
.order-card.dispatched{border-color:var(--success);background:rgba(34,197,94,.02)}
.order-card.retardo{border-left:4px solid var(--danger);animation:pulse-border 2s infinite}
.order-card.bloqueado{border-left:4px solid var(--warning);background:rgba(245,158,11,.02)}
@keyframes pulse-border{0%,100%{border-left-color:var(--danger)}50%{border-left-color:rgba(239,68,68,.3)}}

.order-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.order-client{font-size:15px;font-weight:800;color:var(--text)}
.order-code{font-size:11px;color:var(--muted);font-weight:500}
.order-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:6px;font-size:12px;color:var(--muted);margin-bottom:10px}
.order-meta span{display:flex;align-items:center;gap:4px}
.order-meta strong{color:var(--text);font-weight:600}
.order-products{font-size:12px;color:var(--muted);margin-bottom:10px;max-height:60px;overflow-y:auto}
.order-products ul{list-style:none;padding:0}
.order-products li{padding:2px 0;border-bottom:1px solid #f8fafc}
.order-products li:last-child{border-bottom:none}
.order-bottom{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.order-actions{display:flex;gap:6px;align-items:center}

.dispatch-btn{padding:8px 20px;border-radius:10px;border:2px solid var(--success);background:linear-gradient(135deg,var(--success),var(--success-dark));color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.dispatch-btn:hover{transform:scale(1.03);box-shadow:0 4px 16px rgba(34,197,94,.35)}
.dispatch-btn:active{transform:scale(.97)}
.dispatch-btn.undo{background:linear-gradient(135deg,var(--warning),#d97706);border-color:var(--warning)}

.sello-despachado{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--success),var(--success-dark));color:#fff;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(34,197,94,.3)}

.retardo-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(239,68,68,.1);color:var(--danger);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.group-header{background:linear-gradient(135deg,#f8fafc,#f1f5f9);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .2s}
.group-header:hover{border-color:var(--primary);background:var(--primary-light)}
.group-header .group-name{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px}
.group-header .group-stats{display:flex;gap:12px;align-items:center;font-size:12px;font-weight:600}
.group-content{margin-bottom:20px}

.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;color:#fff;z-index:2000;transform:translateY(100px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:8px;max-width:400px;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:linear-gradient(135deg,var(--success),var(--success-dark))}
.toast.error{background:linear-gradient(135deg,var(--danger),var(--danger-dark))}
.toast.info{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}

.empty{text-align:center;padding:40px;color:var(--muted)}
.empty i{font-size:40px;margin-bottom:12px;display:block;opacity:.5}

.modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.modal.open{display:flex}
.modal-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:500px;animation:modalIn .2s ease}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.modal-body{padding:20px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border)}
@keyframes modalIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.order-card.old-pending{border-left:4px solid #7c3aed;background:rgba(139,92,246,.03)}
.old-day-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(139,92,246,.12);color:#7c3aed}

.alert-banner{background:linear-gradient(135deg,#fef3c7,#fff7ed);border:1.5px solid #f59e0b;border-radius:var(--radius);padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px;animation:bannerPulse 3s infinite}
.alert-banner .alert-icon{width:40px;height:40px;border-radius:10px;background:rgba(245,158,11,.15);display:flex;align-items:center;justify-content:center;font-size:18px;color:#d97706;flex-shrink:0}
.alert-banner .alert-text{flex:1}
.alert-banner .alert-title{font-size:14px;font-weight:800;color:#92400e}
.alert-banner .alert-desc{font-size:12px;color:#a16207;margin-top:2px}
@keyframes bannerPulse{0%,100%{border-color:#f59e0b}50%{border-color:#fbbf24}}

.hidden{display:none!important}

@media(max-width:768px){
  .topbar{flex-direction:column;gap:10px;text-align:center}
  .topbar .actions{justify-content:center}
  .summary-cards{grid-template-columns:1fr 1fr}
  .filters-bar{flex-direction:column;align-items:stretch}
  .tab-bar{overflow-x:auto}
  .order-meta{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo"><i class="fas fa-truck-fast"></i></div>
      <div><h1>Panel de Despachos</h1><div class="sub">La Zapatería — Gestión Ágil de Envíos</div></div>
    </div>
    <div class="actions">
      <div class="pill" id="userPill"><i class="fas fa-user"></i> <strong>...</strong></div>
      <div class="pill" id="clockPill"><i class="fas fa-clock"></i> <span id="liveClock">--:--</span></div>
      <button class="btn btn-ghost" style="color:#94a3b8" onclick="location.href='generar_pedidos.html'"><i class="fas fa-arrow-left"></i> Pedidos</button>
      <button class="btn btn-ghost" style="color:#94a3b8" onclick="location.href='https://userlink2024.github.io/lazapateria/TABLERO.HTML'"><i class="fas fa-home"></i> Tablero</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="summary-cards" id="summaryCards">
    <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-clipboard-list"></i></div><div><div class="stat-label">Total Hoy</div><div class="stat-value" id="statTotal">0</div></div></div>
    <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-hourglass-half"></i></div><div><div class="stat-label">Pendientes</div><div class="stat-value" id="statPendientes">0</div></div></div>
    <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-double"></i></div><div><div class="stat-label">Despachados</div><div class="stat-value" id="statDespachados">0</div></div></div>
    <div class="stat-card"><div class="stat-icon red"><i class="fas fa-exclamation-triangle"></i></div><div><div class="stat-label">En Retardo</div><div class="stat-value" id="statRetardos">0</div></div></div>
    <div class="stat-card"><div class="stat-icon purple"><i class="fas fa-shoe-prints"></i></div><div><div class="stat-label">Pares Despachados</div><div class="stat-value" id="statPares">0</div></div></div>
  </div>

  <!-- FILTERS -->
  <div class="filters-bar">
    <input type="text" class="form-input" id="searchInput" placeholder="🔍 Buscar cliente, código, asesor, transportadora..." style="flex:1;min-width:200px">
    <select class="form-input" id="filterTransportadora" style="min-width:180px">
      <option value="">Todas las transportadoras</option>
    </select>
    <select class="form-input" id="filterAsesor" style="min-width:160px">
      <option value="">Todos los asesores</option>
    </select>
    <button class="btn btn-secondary btn-sm" id="btnExportar"><i class="fas fa-file-excel"></i> Exportar</button>
  </div>

  <!-- TABS -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="pendientes"><i class="fas fa-hourglass-half"></i> Pendientes <span class="count" id="tabCountPendientes">0</span></button>
    <button class="tab-btn" data-tab="retardos"><i class="fas fa-exclamation-triangle"></i> Retardos <span class="count" id="tabCountRetardos">0</span></button>
    <button class="tab-btn" data-tab="despachados"><i class="fas fa-check-double"></i> Despachados <span class="count" id="tabCountDespachados">0</span></button>
    <button class="tab-btn" data-tab="anteriores"><i class="fas fa-calendar-minus" style="color:inherit"></i> Días Anteriores <span class="count" id="tabCountAnteriores">0</span></button>
    <button class="tab-btn" data-tab="todos"><i class="fas fa-list"></i> Todos <span class="count" id="tabCountTodos">0</span></button>
  </div>

  <!-- BULK ACTIONS -->
  <div class="card hidden" id="bulkBar" style="padding:12px 20px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;font-weight:700"><i class="fas fa-check-circle" style="color:var(--primary)"></i> <span id="bulkCount">0</span> seleccionado(s)</span>
    <div class="btn-group">
      <button class="btn btn-success btn-sm" id="btnBulkDispatch"><i class="fas fa-truck-fast"></i> Despachar Seleccionados</button>
      <button class="btn btn-secondary btn-sm" id="btnBulkClear"><i class="fas fa-times"></i> Limpiar</button>
    </div>
  </div>

  <!-- ALERT BANNER FOR PREVIOUS DAYS -->
  <div class="alert-banner hidden" id="alertBannerPrevDays">
    <div class="alert-icon"><i class="fas fa-calendar-exclamation"></i>⚠️</div>
    <div class="alert-text">
      <div class="alert-title" id="alertBannerTitle">Pedidos de días anteriores sin despachar</div>
      <div class="alert-desc" id="alertBannerDesc">Hay pedidos pendientes de días anteriores que requieren atención.</div>
    </div>
    <button class="btn btn-warning btn-sm" onclick="switchToTab('anteriores')"><i class="fas fa-eye"></i> Ver</button>
    <button class="btn btn-ghost" style="color:#92400e;padding:4px 8px" onclick="this.parentElement.classList.add('hidden')"><i class="fas fa-xmark"></i></button>
  </div>

  <!-- ORDERS GRID -->
  <div id="ordersContainer">
    <div class="empty"><i class="fas fa-spinner fa-spin"></i><p>Cargando pedidos...</p></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal" id="confirmModal">
  <div class="modal-card">
    <div class="modal-head"><h3 id="confirmTitle"><i class="fas fa-question-circle" style="color:var(--primary)"></i> Confirmar</h3><button class="btn btn-ghost" style="color:var(--muted)" onclick="closeConfirm()"><i class="fas fa-xmark"></i></button></div>
    <div class="modal-body"><p id="confirmMsg"></p></div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeConfirm()">Cancelar</button><button class="btn btn-primary" id="confirmOk">Aceptar</button></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toastEl"></div>

<script>
// ============================
// FIREBASE CONFIG
// ============================
const firebaseConfig = {
    apiKey: "AIzaSyChvezwN6DrYXdnBvGLxnjhi4I9xUaxKfU",
    authDomain: "lazapateria-c4157.firebaseapp.com",
    projectId: "lazapateria-c4157",
    storageBucket: "lazapateria-c4157.firebasestorage.app",
    measurementId: "G-HVG7615JEE"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ============================
// AUTH & ROLE CHECK
// ============================
const datosUsuario = JSON.parse(localStorage.getItem('datosUsuario'));
if (!datosUsuario || !datosUsuario.nombreCompleto) {
    alert('No se detectó sesión activa. Redirigiendo...');
    location.href = 'https://userlink2024.github.io/lazapateria/index.html';
}
const userRole = (datosUsuario.permisos || '').toLowerCase();
const isAdmin = userRole === 'administrador';
const isSuper = userRole === 'supernumerario';
if (!isAdmin && !isSuper) {
    alert('Acceso restringido: solo Administradores.');
    location.href = 'generar_pedidos.html';
}
document.getElementById('userPill').innerHTML = `<i class="fas fa-user"></i> <strong>${datosUsuario.nombreCompleto}</strong>`;

// ============================
// GLOBAL STATE
// ============================
const $ = id => document.getElementById(id);
let allRegistros = [];
let previousDayRegistros = [];
let filteredRegistros = [];
let filteredPrevDayRegistros = [];
let currentTab = 'pendientes';
let retardTimeMinutes = 20;
let selectedIds = new Set();
let unsubscribe = null;
let unsubscribePrevDays = null;
let audioCtx = null;
let _startOfDay = null;

// ============================
// UTILITIES
// ============================
function norm(s) { return (s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim(); }

function fmtCOP(n) { return (parseFloat(n) || 0).toLocaleString('es-CO'); }

function fmtTime(date) {
    if (!date) return '';
    return date.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', hour12: true });
}
function fmtDate(date) {
    if (!date) return '';
    return date.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' + fmtTime(date);
}

function toast(msg, type = 'success') {
    const el = $('toastEl');
    const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
    el.className = `toast ${type}`;
    el.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${msg}`;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3500);
}

// Confirm modal
let _confirmResolve = null;
function showConfirm(title, msg) {
    return new Promise(resolve => {
        _confirmResolve = resolve;
        $('confirmTitle').innerHTML = `<i class="fas fa-question-circle" style="color:var(--primary)"></i> ${title}`;
        $('confirmMsg').textContent = msg;
        $('confirmModal').classList.add('open');
    });
}
function closeConfirm(val) {
    $('confirmModal').classList.remove('open');
    if (_confirmResolve) { _confirmResolve(val || false); _confirmResolve = null; }
}
$('confirmOk').addEventListener('click', () => closeConfirm(true));
$('confirmModal').addEventListener('click', e => { if (e.target === $('confirmModal')) closeConfirm(false); });

// Live clock

// Audio
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function playDispatchSound() {
    initAudio();
    if (!audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        osc.type = 'sine';
        osc.start(audioCtx.currentTime);
        osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(1320, audioCtx.currentTime + 0.2);
        osc.stop(audioCtx.currentTime + 0.35);
    } catch (e) {}
}

// TTS "DESPACHADO"
function speakDespachado() {

        u.lang = 'es-MX'; u.rate = 1.1; u.pitch = 1;
        speechSynthesis.speak(u);

}

async function loadSettings() {

// ============================
// REAL-TIME LISTENER
// ============================
function parseRegistro(d) {
    const data = d.data();
    const fechaHora = data.fecha_hora && data.fecha_hora.toDate ? data.fecha_hora.toDate() : null;
    const despachadoTimestamp = data.despachadoTimestamp && data.despachadoTimestamp.toDate ? data.despachadoTimestamp.toDate() : null;
    const empaqueTimestamp = data.enviadoAEmpaqueTimestamp && data.enviadoAEmpaqueTimestamp.toDate ? data.enviadoAEmpaqueTimestamp.toDate() : null;
    const nowMs = Date.now();
    const isRetardo = !data.enviadoAEmpaque && data.despachado !== true && fechaHora && ((nowMs - fechaHora.getTime()) / 60000 > retardTimeMinutes);
    const isPreviousDay = fechaHora ? fechaHora < _startOfDay : false;
    return {
        id: d.id,
        ...data,
        _fechaHora: fechaHora,
        _despachadoTimestamp: despachadoTimestamp,
        _empaqueTimestamp: empaqueTimestamp,
        _isRetardo: isRetardo,
        _isPreviousDay: isPreviousDay,
        _searchBlob: norm([data.codigo_unico, data.cliente, data.asesor, data.transportadora, data.observaciones,
            (Array.isArray(data.productos) ? data.productos.map(p => [p.referencia, p.color, p.talla].join(' ')).join(' ') : '')
        ].join(' '))
    };
}

function startListener() {
    const now = new Date();
    _startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
    const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);

    if (unsubscribe) unsubscribe();
    if (unsubscribePrevDays) unsubscribePrevDays();

    // Listener 1: Today's orders (all statuses)
    unsubscribe = db.collection('registros')
        .where('fecha_hora', '>=', _startOfDay)
        .where('fecha_hora', '<=', endOfDay)
        .orderBy('fecha_hora', 'desc')
        .onSnapshot(snapshot => {
            allRegistros = [];
            snapshot.forEach(d => { allRegistros.push(parseRegistro(d)); });
            populateFilters();
            applyFiltersAndRender();
        }, err => {
            console.error('Error en listener:', err);
            $('ordersContainer').innerHTML = '<div class="empty"><i class="fas fa-exclamation-triangle"></i><p>Error al cargar pedidos.</p></div>';
        });

    // Listener 2: Previous days — only non-dispatched orders
    unsubscribePrevDays = db.collection('registros')
        .where('despachado', '==', false)
        .where('fecha_hora', '<', _startOfDay)
        .orderBy('fecha_hora', 'desc')
        .onSnapshot(snapshot => {
            previousDayRegistros = [];
            snapshot.forEach(d => {
                const r = parseRegistro(d);
                r._isPreviousDay = true;
                previousDayRegistros.push(r);
            });
            populateFilters();
            applyFiltersAndRender();
            showPrevDaysBanner();
        }, err => {
            console.warn('Error en listener de días anteriores:', err);
        });
}

// ============================
// FILTERS
// ============================
function showPrevDaysBanner() {
    const banner = $('alertBannerPrevDays');
    if (previousDayRegistros.length > 0) {
        const count = previousDayRegistros.length;
        const pares = previousDayRegistros.reduce((s, r) => s + (parseInt(r.num_pares) || 0), 0);
        $('alertBannerTitle').textContent = `${count} pedido(s) de días anteriores sin despachar`;
        $('alertBannerDesc').textContent = `${pares} pares pendientes de días anteriores requieren atención inmediata.`;
        banner.classList.remove('hidden');
    } else {
        banner.classList.add('hidden');
    }
}

function switchToTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
    if (btn) btn.classList.add('active');
    currentTab = tab;
    renderOrders();
}
window.switchToTab = switchToTab;

function populateFilters() {
    const transportadoraSet = new Set();
    const asesorSet = new Set();
    const combined = allRegistros.concat(previousDayRegistros);
    combined.forEach(r => {
        if (r.transportadora) transportadoraSet.add(r.transportadora);
        if (r.asesor) asesorSet.add(r.asesor);
    });

    const tSel = $('filterTransportadora');
    const currentT = tSel.value;
    tSel.innerHTML = '<option value="">Todas las transportadoras</option>';
    Array.from(transportadoraSet).sort((a, b) => a.localeCompare(b, 'es')).forEach(t => {
        tSel.innerHTML += `<option value="${t}">${t}</option>`;
    });
    if (Array.from(tSel.options).some(o => o.value === currentT)) tSel.value = currentT;

    const aSel = $('filterAsesor');
    const currentA = aSel.value;
    aSel.innerHTML = '<option value="">Todos los asesores</option>';
    Array.from(asesorSet).sort((a, b) => a.localeCompare(b, 'es')).forEach(a => {
        aSel.innerHTML += `<option value="${a}">${a}</option>`;
    });
    if (Array.from(aSel.options).some(o => o.value === currentA)) aSel.value = currentA;
}

function applyFiltersAndRender() {
    const q = norm($('searchInput').value);
    const tFilter = $('filterTransportadora').value;
    const aFilter = $('filterAsesor').value;

    const filterFn = r => {
        if (q && !r._searchBlob.includes(q)) return false;
        if (tFilter && r.transportadora !== tFilter) return false;
        if (aFilter && r.asesor !== aFilter) return false;
        return true;
    };

    filteredRegistros = allRegistros.filter(filterFn);
    filteredPrevDayRegistros = previousDayRegistros.filter(filterFn);

    updateStats();
    updateTabs();
    renderOrders();
}

// ============================
// STATS
// ============================
function updateStats() {
    const total = filteredRegistros.length;
    const despachados = filteredRegistros.filter(r => r.despachado === true);
    const pendientes = filteredRegistros.filter(r => r.despachado !== true);
    const retardos = filteredRegistros.filter(r => r._isRetardo);
    const paresDesp = despachados.reduce((s, r) => s + (parseInt(r.num_pares) || 0), 0);

    $('statTotal').textContent = total + (filteredPrevDayRegistros.length > 0 ? ` (+${filteredPrevDayRegistros.length})` : '');
    $('statPendientes').textContent = pendientes.length;
    $('statDespachados').textContent = despachados.length;
    $('statRetardos').textContent = retardos.length;
    $('statPares').textContent = paresDesp;
}

function updateTabs() {
    const pendientes = filteredRegistros.filter(r => r.despachado !== true);
    const retardos = filteredRegistros.filter(r => r._isRetardo);
    const despachados = filteredRegistros.filter(r => r.despachado === true);
    const anteriores = filteredPrevDayRegistros.length;

    $('tabCountPendientes').textContent = pendientes.length;
    $('tabCountRetardos').textContent = retardos.length;
    $('tabCountDespachados').textContent = despachados.length;
    $('tabCountAnteriores').textContent = anteriores;
    $('tabCountTodos').textContent = filteredRegistros.length;

    // Highlight the anteriores tab if there are old pending orders
    const antTab = document.querySelector('.tab-btn[data-tab="anteriores"]');
    if (antTab) {
        if (anteriores > 0 && currentTab !== 'anteriores') {
            antTab.style.background = antTab.classList.contains('active') ? '' : 'rgba(239,68,68,.08)';
            antTab.style.color = antTab.classList.contains('active') ? '' : '#dc2626';
        } else {
            antTab.style.background = '';
            antTab.style.color = '';
        }
    }
}

// ============================
// RENDER
// ============================
function getTabRecords() {
    switch (currentTab) {
        case 'pendientes': return filteredRegistros.filter(r => r.despachado !== true);
        case 'retardos': return filteredRegistros.filter(r => r._isRetardo);
        case 'despachados': return filteredRegistros.filter(r => r.despachado === true);
        case 'anteriores': return filteredPrevDayRegistros;
        default: return filteredRegistros;
    }
}

function renderOrders() {
    const records = getTabRecords();
    const container = $('ordersContainer');

    if (records.length === 0) {
        const msgs = {
            pendientes: 'No hay pedidos pendientes de despacho.',
            retardos: '¡Sin retardos! Todo al día.',
            despachados: 'No hay despachos registrados hoy.',
            anteriores: '¡Excelente! No hay pedidos de días anteriores pendientes.',
            todos: 'No hay pedidos hoy.'
        };
        const icons = {
            pendientes: 'fa-inbox', retardos: 'fa-champagne-glasses', despachados: 'fa-truck', anteriores: 'fa-calendar-check', todos: 'fa-calendar-xmark'
        };
        container.innerHTML = `<div class="empty"><i class="fas ${icons[currentTab]}"></i><p>${msgs[currentTab]}</p></div>`;
        updateBulkBar();
        return;
    }

    // Group by transportadora
    if (currentTab === 'pendientes' || currentTab === 'retardos' || currentTab === 'anteriores') {
        const groups = {};
        records.forEach(r => {
            const key = r.transportadora || 'Sin transportadora';
            if (!groups[key]) groups[key] = [];
            groups[key].push(r);
        });
        const sortedKeys = Object.keys(groups).sort((a, b) => groups[b].length - groups[a].length);

        let html = '';
        sortedKeys.forEach(key => {
            const items = groups[key];
            const totalPares = items.reduce((s, r) => s + (parseInt(r.num_pares) || 0), 0);
            const totalVal = items.reduce((s, r) => s + (parseFloat(r.valor_total) || 0), 0);
            html += `<div class="group-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
                <div class="group-name"><i class="fas fa-truck" style="color:var(--primary)"></i> ${key} <span class="chip info">${items.length} pedido(s)</span></div>
                <div class="group-stats">
                    <span><i class="fas fa-shoe-prints"></i> ${totalPares} pares</span>
                    <span><i class="fas fa-dollar-sign"></i> $${fmtCOP(totalVal)}</span>
                    ${isAdmin ? `<button class="btn btn-success btn-xs" onclick="event.stopPropagation(); bulkDispatchGroup('${key}')"><i class="fas fa-truck-fast"></i> Despachar Grupo</button>` : ''}
                </div>
            </div>`;
            html += '<div class="group-content dispatch-grid">';
            items.forEach(r => { html += renderOrderCard(r); });
            html += '</div>';
        });
        container.innerHTML = html;
    } else {
        let html = '<div class="dispatch-grid">';
        records.forEach(r => { html += renderOrderCard(r); });
        html += '</div>';
        container.innerHTML = html;
    }

    updateBulkBar();
}

function renderOrderCard(r) {
    const isDespachado = r.despachado === true;
    const isBloqueado = r.bloqueado === true;
    const isRetardo = r._isRetardo;
    const isPrevDay = r._isPreviousDay === true;
    const fecha = r._fechaHora ? (isPrevDay ? fmtDate(r._fechaHora) : fmtTime(r._fechaHora)) : '';
    const pares = parseInt(r.num_pares) || 0;
    const valor = parseFloat(r.valor_total) || 0;
    const bodegueros = Array.isArray(r.bodegueros_encargados) && r.bodegueros_encargados.length > 0 ? r.bodegueros_encargados.join(', ') : '';

    let retardoHtml = '';
    if (isRetardo && r._fechaHora) {
        const diffMin = Math.floor((Date.now() - r._fechaHora.getTime()) / 60000);
        const overdue = diffMin - retardTimeMinutes;
        const h = Math.floor(overdue / 60);
        const m = overdue % 60;
        retardoHtml = `<span class="retardo-badge"><i class="fas fa-exclamation-triangle"></i> Retardo: ${h > 0 ? h + 'h ' : ''}${m}m</span>`;
    }

    let selloHtml = '';
    if (isDespachado) {
        const por = r.despachadoPor || '';
        const when = r._despachadoTimestamp ? fmtTime(r._despachadoTimestamp) : '';
        selloHtml = `<div class="sello-despachado"><i class="fas fa-check-circle"></i> ${por}${when ? ' · ' + when : ''}</div>`;
    }

    let bloqueadoHtml = '';
    if (isBloqueado) {
        bloqueadoHtml = `<span class="chip warning"><i class="fas fa-lock"></i> Bloqueado${r.bloqueadoPor ? ' por ' + r.bloqueadoPor : ''}</span>`;
    }

    let empaqueHtml = '';
    if (r.enviadoAEmpaque) {
        const empaqueTime = r._empaqueTimestamp ? fmtTime(r._empaqueTimestamp) : '';
        empaqueHtml = `<span class="chip ok"><i class="fas fa-box-open"></i> Empaque ${empaqueTime}</span>`;
    }

    let productosHtml = '';
    if (Array.isArray(r.productos) && r.productos.length > 0) {
        productosHtml = '<ul>' + r.productos.map(p =>
            `<li><strong>${p.referencia || ''}</strong> ${p.color || ''} T:${p.talla || ''} — $${fmtCOP(p.precio || 0)}</li>`
        ).join('') + '</ul>';
    }

    const isSelected = selectedIds.has(r.id);
    let oldDayHtml = '';
    if (isPrevDay && r._fechaHora) {
        const diffDays = Math.floor((_startOfDay.getTime() - r._fechaHora.getTime()) / (1000 * 60 * 60 * 24));
        const dayLabel = diffDays === 1 ? 'Ayer' : diffDays === 2 ? 'Hace 2 días' : `Hace ${diffDays} días`;
        oldDayHtml = `<span class="old-day-badge"><i class="fas fa-calendar-clock"></i> ${dayLabel} — ${r._fechaHora.toLocaleDateString('es-CO', { weekday: 'short', day: 'numeric', month: 'short' })}</span>`;
    }

    const cardClass = [
        'order-card',
        isDespachado ? 'dispatched' : '',
        isRetardo ? 'retardo' : '',
        isBloqueado ? 'bloqueado' : '',
        isPrevDay ? 'old-pending' : ''
    ].filter(Boolean).join(' ');

    let actionBtn = '';
    if (isAdmin) {
        if (isDespachado) {
            actionBtn = `<button class="dispatch-btn undo" onclick="undoDispatch('${r.id}')"><i class="fas fa-undo"></i> Deshacer</button>`;
        } else {
            actionBtn = `<button class="dispatch-btn" onclick="dispatchOrder('${r.id}')"><i class="fas fa-truck-fast"></i> Despachar</button>`;
        }
    } else {
        if (isDespachado) {
            actionBtn = `<span class="chip ok"><i class="fas fa-check"></i> Despachado</span>`;
        } else {
            actionBtn = `<span class="chip warning"><i class="fas fa-clock"></i> Pendiente</span>`;
        }
    }

    return `<div class="${cardClass}" data-id="${r.id}">
        ${selloHtml}
        <div class="order-top">
            <div>
                ${isAdmin && !isDespachado ? `<input type="checkbox" style="margin-right:8px;transform:scale(1.2);cursor:pointer" ${isSelected ? 'checked' : ''} onchange="toggleSelect('${r.id}', this.checked)">` : ''}
                <span class="order-client">${r.cliente || 'Sin cliente'}</span>
                <div class="order-code">${r.codigo_unico || ''} · ${fecha}</div>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
                ${oldDayHtml} ${retardoHtml} ${empaqueHtml} ${bloqueadoHtml}
            </div>
        </div>
        <div class="order-meta">
            <span><i class="fas fa-user" style="color:var(--info)"></i> <strong>${r.asesor || 'N/A'}</strong></span>
            <span><i class="fas fa-truck" style="color:var(--primary)"></i> <strong>${r.transportadora || 'N/A'}</strong></span>
            <span><i class="fas fa-shoe-prints" style="color:var(--purple)"></i> <strong>${pares} pares</strong></span>
            <span><i class="fas fa-dollar-sign" style="color:var(--success)"></i> <strong>$${fmtCOP(valor)}</strong></span>
            ${r.modalidad_envio ? `<span><i class="fas fa-box" style="color:var(--muted)"></i> ${r.modalidad_envio}</span>` : ''}
            ${bodegueros ? `<span><i class="fas fa-hard-hat" style="color:var(--warning)"></i> ${bodegueros}</span>` : ''}
        </div>
        ${productosHtml ? `<div class="order-products">${productosHtml}</div>` : ''}
        ${r.observaciones ? `<div style="font-size:13px;color:#92400e;background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-weight:600;display:flex;align-items:flex-start;gap:8px;line-height:1.4"><i class="fas fa-triangle-exclamation" style="color:#d97706;margin-top:2px;flex-shrink:0"></i><span>${r.observaciones}</span></div>` : ''}
        <div class="order-bottom">
            <div style="font-size:11px;color:var(--muted)">${r._fechaHora ? fmtDate(r._fechaHora) : ''}</div>
            <div class="order-actions">${actionBtn}</div>
        </div>
    </div>`;
}

// ============================
// DISPATCH ACTIONS
// ============================
async function dispatchOrder(id) {
    if (!isAdmin) { toast('Solo administradores pueden despachar.', 'error'); return; }
    initAudio();
    try {
        const docRef = db.collection('registros').doc(id);
        const snap = await docRef.get();
        const updateData = {
            despachado: true,
            despachadoPor: datosUsuario.nombreCompleto,
            despachadoTimestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        if (snap.exists) {
            const d = snap.data();
            if (d.enviadoAEmpaque !== true) {
                updateData.enviadoAEmpaque = true;
                updateData.enviadoAEmpaqueTimestamp = firebase.firestore.Timestamp.fromDate(new Date());
            } else if (d.enviadoAEmpaque === true && !d.enviadoAEmpaqueTimestamp) {
                updateData.enviadoAEmpaqueTimestamp = firebase.firestore.Timestamp.fromDate(new Date());
            }
        }
        await docRef.update(updateData);
        playDispatchSound();
        speakDespachado();
        toast('¡Pedido despachado!');
        selectedIds.delete(id);
    } catch (e) {
        console.error('Error despachando:', e);
        toast('Error al despachar el pedido.', 'error');
    }
}

async function undoDispatch(id) {
    if (!isAdmin) return;
    const ok = await showConfirm('Deshacer Despacho', '¿Quitar el estado de despachado a este pedido?');
    if (!ok) return;
    try {
        await db.collection('registros').doc(id).update({
            despachado: false,
            despachadoPor: '',
            despachadoTimestamp: null
        });
        toast('Despacho revertido.', 'info');
    } catch (e) {
        toast('Error al revertir.', 'error');
    }
}

// Bulk dispatch
async function bulkDispatchGroup(transportadora) {
    const records = getTabRecords().filter(r => (r.transportadora || 'Sin transportadora') === transportadora && r.despachado !== true);
    if (records.length === 0) { toast('No hay pedidos pendientes en este grupo.', 'info'); return; }
    const ok = await showConfirm('Despachar Grupo', `¿Despachar ${records.length} pedido(s) de ${transportadora}?`);
    if (!ok) return;
    initAudio();
    let count = 0;
    for (const r of records) {
        try {
            const docRef = db.collection('registros').doc(r.id);
            const snap = await docRef.get();
            const updateData = {
                despachado: true,
                despachadoPor: datosUsuario.nombreCompleto,
                despachadoTimestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (snap.exists && snap.data().enviadoAEmpaque !== true) {
                updateData.enviadoAEmpaque = true;
                updateData.enviadoAEmpaqueTimestamp = firebase.firestore.Timestamp.fromDate(new Date());
            }
            await docRef.update(updateData);
            count++;
        } catch (e) { console.warn('Error despachando', r.id, e); }
    }
    playDispatchSound();
    speakDespachado();
    toast(`${count} pedido(s) despachados de ${transportadora}!`);
}

// Bulk selected
async function bulkDispatchSelected() {
    if (selectedIds.size === 0) return;
    const ok = await showConfirm('Despachar Seleccionados', `¿Despachar ${selectedIds.size} pedido(s) seleccionados?`);
    if (!ok) return;
    initAudio();
    let count = 0;
    for (const id of selectedIds) {
        try {
            const docRef = db.collection('registros').doc(id);
            const snap = await docRef.get();
            const updateData = {
                despachado: true,
                despachadoPor: datosUsuario.nombreCompleto,
                despachadoTimestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (snap.exists && snap.data().enviadoAEmpaque !== true) {
                updateData.enviadoAEmpaque = true;
                updateData.enviadoAEmpaqueTimestamp = firebase.firestore.Timestamp.fromDate(new Date());
            }
            await docRef.update(updateData);
            count++;
        } catch (e) {}
    }
    selectedIds.clear();
    playDispatchSound();
    speakDespachado();
    toast(`${count} pedido(s) despachados!`);
}

// Selection
function toggleSelect(id, checked) {
    if (checked) selectedIds.add(id); else selectedIds.delete(id);
    updateBulkBar();
}
function updateBulkBar() {
    const bar = $('bulkBar');
    if (selectedIds.size > 0) { bar.classList.remove('hidden'); bar.style.display = 'flex'; }
    else { bar.classList.add('hidden'); bar.style.display = 'none'; }
    $('bulkCount').textContent = selectedIds.size;
}

function exportToExcel() {
    const records = getTabRecords();
    if (records.length === 0) { toast('No hay datos para exportar.', 'info'); return; }
    const rows = records.map(r => ({
        'Código': r.codigo_unico || '',
        'Cliente': r.cliente || '',
        'Asesor': r.asesor || '',
        'Transportadora': r.transportadora || '',
        'Modalidad': r.modalidad_envio || '',
        'Pares': r.num_pares || 0,
        'Valor Total': r.valor_total || 0,
        'Bodegueros': (r.bodegueros_encargados || []).join(', '),
        'Despachado': r.despachado ? 'SÍ' : 'NO',
        'Despachado Por': r.despachadoPor || '',
        'Hora Despacho': r._despachadoTimestamp ? fmtDate(r._despachadoTimestamp) : '',
        'Hora Pedido': r._fechaHora ? fmtDate(r._fechaHora) : '',
        'Observaciones': r.observaciones || ''
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Despachos');
    const today = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `Despachos_${today}.xlsx`);
    toast('Excel exportado.');
}

// ============================
// EVENT LISTENERS
// ============================
// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        renderOrders();
    });
});

// Filters
$('searchInput').addEventListener('input', applyFiltersAndRender);
$('filterTransportadora').addEventListener('change', applyFiltersAndRender);
$('filterAsesor').addEventListener('change', applyFiltersAndRender);
$('btnExportar').addEventListener('click', exportToExcel);
$('btnBulkDispatch').addEventListener('click', bulkDispatchSelected);
$('btnBulkClear').addEventListener('click', () => { selectedIds.clear(); updateBulkBar(); renderOrders(); });

// Expose functions to window for onclick
window.dispatchOrder = dispatchOrder;
window.undoDispatch = undoDispatch;
window.bulkDispatchGroup = bulkDispatchGroup;
window.toggleSelect = toggleSelect;

// ============================
// INIT
// ============================
(async function init() {
    await loadSettings();
    startListener();

    // Refresh retardo calculations every 30s
    setInterval(() => {
        const now = Date.now();
        allRegistros.forEach(r => {
            r._isRetardo = !r.enviadoAEmpaque && r.despachado !== true && r._fechaHora && ((now - r._fechaHora.getTime()) / 60000 > retardTimeMinutes);
        });
        previousDayRegistros.forEach(r => {
            r._isRetardo = true;
        });
        applyFiltersAndRender();
    }, 30000);
})();
</script>
