<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>En Mantenimiento</title>

<script>
// Limpiar almacenamiento local
try {
    localStorage.clear();
    sessionStorage.clear();

    // Borrar IndexedDB si existe
    if (window.indexedDB && indexedDB.databases) {
        indexedDB.databases().then(dbs => {
            dbs.forEach(db => {
                if (db.name) {
                    indexedDB.deleteDatabase(db.name);
                }
            });
        });
    }

    // Limpiar caché del Service Worker
    if ('caches' in window) {
        caches.keys().then(names => {
            names.forEach(name => caches.delete(name));
        });
    }

    console.log('Datos locales eliminados');
} catch(err) {
    console.error('Error limpiando almacenamiento:', err);
}
</script>

body{
    display:flex;
    justify-content:center;

    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
.contenedor{
    text-align:center;
}
h1{
    color:#d32f2f;
}
</style>
</head>
<body>

<div class="contenedor">
    <h1>FUERA DE SERVICIO</h1>
    <p>Estamos realizando mantenimiento.</p>
</div>

</body>
</html>
