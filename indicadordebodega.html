<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>En Mantenimiento</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        background:#f5f5f5;
    }

    .contenedor{
        text-align:center;
        background:white;
        padding:50px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,0.1);
        max-width:600px;
        width:90%;
    }

    .icono{
        font-size:80px;
        margin-bottom:20px;
    }

    h1{
        color:#d32f2f;
        margin-bottom:15px;
        font-size:2.5rem;
    }

    p{
        color:#555;
        font-size:1.2rem;
        line-height:1.6;
    }

    .footer{
        margin-top:25px;
        color:#888;
        font-size:0.9rem;
    }
</style>
</head>
<body>

<div class="contenedor">
    <div class="icono">🔧</div>
    <h1>FUERA DE SERVICIO</h1>
    <p>
        Estamos realizando tareas de mantenimiento para mejorar nuestro sistema.
        Por favor, intenta nuevamente más tarde.
    </p>
    <div class="footer">
        Sistema temporalmente no disponible
    </div>
</div>

</body>
</html>
