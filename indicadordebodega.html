<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciando sesión...</title>

<style>
body{
    margin:0;
    background:#1a1a1a;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.contenedor{
    text-align:center;
    max-width:600px;
    padding:40px;
}
h1{ color:#4caf50; margin-bottom:20px; }
.estado{
    margin-top:25px;
    padding:15px;
    background:#2c2c2c;
    border-radius:8px;
    font-size:18px;
    line-height:1.8;
}
.ok{ color:#4caf50; }
.error{ color:#ff5252; }
</style>
</head>
<body>

<div class="contenedor">
    <h1>🔑 Iniciando Sesión TV</h1>
    <p>Conectando con el servidor...</p>
    <div class="estado" id="estado">Iniciando...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const estado = document.getElementById("estado");

function msg(texto, clase="ok"){
    estado.innerHTML += `<br><span class="${clase}">${texto}</span>`;
}

const firebaseConfig = {
    apiKey: "AIzaSyChvezwN6DrYXdnBvGLxnjhi4I9xUaxKfU",
    authDomain: "lazapateria-c4157.firebaseapp.com",
    projectId: "lazapateria-c4157",
    storageBucket: "lazapateria-c4157.firebasestorage.app",
    messagingSenderId: "300241769138",
    appId: "1:300241769138:web:8ca1847de3c4fb5042afab",
    measurementId: "G-HVG7615JEE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function iniciarSesionTV(){
    estado.innerHTML = "";

    try{
        msg("🔍 Buscando usuario TV...");
        const snapshot = await db.collection("usuarios")
            .where("usuario", "==", "TV")
            .get();

        if(snapshot.empty){
            msg("❌ Usuario TV no encontrado en la base de datos.", "error");
            return;
        }

        let usuarioData = null;
        snapshot.forEach(doc => {
            const data = doc.data();
            if(data.contraseña === "0000"){
                usuarioData = data;
            }
        });

        if(!usuarioData){
            msg("❌ Contraseña incorrecta para el usuario TV.", "error");
            return;
        }

        localStorage.setItem("datosUsuario", JSON.stringify(usuarioData));
        msg("✅ Sesión iniciada correctamente como TV");
        msg("🚀 Redirigiendo al Panel de Bodega...");

        setTimeout(() => {
            window.location.href = "indicadordebodega.html";
        }, 2000);

    }catch(e){
        msg("❌ Error conectando con el servidor: " + e.message, "error");
    }
}

iniciarSesionTV();
</script>

</body>
</html>
