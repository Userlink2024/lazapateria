<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recordatorio de Facturación</title>
    <!-- Incluir Tailwind CSS para un estilo rápido y limpio -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos personalizados para el canvas */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            margin-bottom: 2rem;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s ease-in-out;
        }

        #reminderCanvas {
            width: 100%;
            height: 100%;
        }

        #message-box {
            background-color: #2d3748;
            padding: 1rem 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            min-height: 5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
        }

        .alarm-state {
            animation: pulse-border 1s infinite alternate;
            background-color: #f56565 !important;
        }
        
        @keyframes pulse-border {
            from { box-shadow: 0 0 0 0 #f56565; }
            to { box-shadow: 0 0 0 10px rgba(245, 101, 101, 0); }
        }

        .alert-message {
            animation: bounce 1s infinite;
            color: #ffffff;
            font-weight: 700;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(-5%);
                animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
            }
            50% {
                transform: translateY(0);
                animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200">
    <div class="flex flex-col items-center justify-center p-6">
        <h1 class="text-3xl sm:text-4xl font-extrabold mb-2">Recordatorio de Facturación</h1>
        <p class="text-lg text-gray-400 mb-8">Nunca olvides facturar de nuevo. ¡Un recordatorio aleatorio o manual te avisará!</p>

        <div id="message-box" class="w-full max-w-lg mb-8 transition-colors duration-500 ease-in-out">
            <span id="status-message" class="text-xl font-medium text-center">Haz clic en "Iniciar" para empezar.</span>
        </div>

        <div id="canvas-container">
            <canvas id="reminderCanvas"></canvas>
        </div>

        <div class="flex gap-4 mt-6">
            <!-- Botones para el modo automático -->
            <div id="auto-mode-controls">
                <button id="startButton" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg">
                    Iniciar Recordatorio
                </button>
            </div>

            <!-- Controles para el modo manual, inicialmente ocultos -->
            <div id="manual-mode-controls" class="hidden flex flex-col items-center gap-4 w-full">
                <div class="flex items-center gap-2">
                    <label for="minutes" class="text-lg">Minutos:</label>
                    <input type="number" id="minutes" value="5" min="0" class="w-16 p-2 rounded-md bg-gray-700 text-white text-center">
                    <label for="seconds" class="text-lg">Segundos:</label>
                    <input type="number" id="seconds" value="0" min="0" max="59" class="w-16 p-2 rounded-md bg-gray-700 text-white text-center">
                </div>
                <input type="text" id="noteInput" placeholder="Añadir una nota (opcional)" class="w-full max-w-sm p-3 rounded-md bg-gray-700 text-white">
                <button id="startManualButton" class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg w-full max-w-sm">
                    Iniciar Manual
                </button>
            </div>
            
            <!-- Botones globales (siempre visibles después de iniciar) -->
            <button id="stopButton" class="hidden px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg">
                Detener y Reprogramar
            </button>
            
            <button id="testSoundButton" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white font-bold rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg">
                Probar Sonido
            </button>
            
            <!-- Botón de cambio de modo -->
            <button id="toggleModeButton" class="px-6 py-3 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg">
                Modo Manual
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('reminderCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const startManualButton = document.getElementById('startManualButton');
        const stopButton = document.getElementById('stopButton');
        const testSoundButton = document.getElementById('testSoundButton');
        const toggleModeButton = document.getElementById('toggleModeButton');
        const autoModeControls = document.getElementById('auto-mode-controls');
        const manualModeControls = document.getElementById('manual-mode-controls');
        const minutesInput = document.getElementById('minutes');
        const secondsInput = document.getElementById('seconds');
        const noteInput = document.getElementById('noteInput');
        const messageBox = document.getElementById('message-box');
        const statusMessage = document.getElementById('status-message');
        const canvasContainer = document.getElementById('canvas-container');

        let reminderTimeoutId = null;
        let countdownRAF = null;
        let alarmAnimRAF = null;
        let alarmSoundInterval = null;
        let audioContext = null;
        let isAlarmActive = false;
        let currentNote = '';
        let currentMode = 'auto';
        let targetTime = 0;

        const canvasSize = 600;
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        let hue = 0;
        let pulseRadius = 0;
        const pulseSpeed = 2;

        // Asegurar AudioContext activo (fix: resume si está suspended)
        function ensureAudio() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') audioContext.resume();
            return audioContext;
        }
        // Desbloquear audio con primer click
        document.addEventListener('click', () => ensureAudio(), { once: true });

        function drawInitialState() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e2e8f0';
            ctx.font = '2rem Inter';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Esperando...', canvas.width / 2, canvas.height / 2);
        }

        // Dibujar countdown en canvas (más visual)
        function drawCountdown(m, s) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 180, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(66,153,225,0.08)';
            ctx.fill();
            ctx.fillStyle = '#90cdf4';
            ctx.font = 'bold 4.5rem Inter';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`, canvas.width/2, canvas.height/2 - 10);
            ctx.fillStyle = '#a0aec0';
            ctx.font = '1.1rem Inter';
            ctx.fillText('hasta el próximo recordatorio', canvas.width/2, canvas.height/2 + 50);
            if (currentNote) {
                ctx.fillStyle = '#e2e8f0';
                ctx.font = '1.2rem Inter';
                ctx.fillText(currentNote, canvas.width/2, canvas.height/2 + 90);
            }
        }

        function drawAlarmAnimation() {
            if (!isAlarmActive) return;
            hue = (hue + 2) % 360;
            pulseRadius += pulseSpeed;
            if (pulseRadius > canvas.width / 2) pulseRadius = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f56565';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, pulseRadius, 0, Math.PI*2, false);
            ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 2.2rem Inter';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('¡FACTURA AHORA!', canvas.width/2, canvas.height/2 - 30);
            if (currentNote) {
                ctx.font = '1.5rem Inter';
                ctx.fillText(currentNote, canvas.width/2, canvas.height/2 + 30);
            }
            alarmAnimRAF = requestAnimationFrame(drawAlarmAnimation);
        }

        // Sonido: 3 beeps agudos escalonados con fade in/out (sin clicks)
        function playBeeps() {
            try {
                const ac = ensureAudio();
                const t = ac.currentTime;
                const freqs = [1000, 1200, 1400];
                for (let i = 0; i < 3; i++) {
                    const osc = ac.createOscillator();
                    const gain = ac.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(freqs[i], t);
                    gain.gain.setValueAtTime(0, t + i * 0.35);
                    gain.gain.linearRampToValueAtTime(0.6, t + i * 0.35 + 0.02);
                    gain.gain.setValueAtTime(0.6, t + i * 0.35 + 0.18);
                    gain.gain.linearRampToValueAtTime(0, t + i * 0.35 + 0.25);
                    osc.connect(gain);
                    gain.connect(ac.destination);
                    osc.start(t + i * 0.35);
                    osc.stop(t + i * 0.35 + 0.25);
                }
            } catch (e) {
                console.error('Error reproduciendo beeps:', e);
            }
        }

        // Disparar alarma: visual + sonido en loop cada 2s
        function triggerAlarm() {
            if (reminderTimeoutId) { clearTimeout(reminderTimeoutId); reminderTimeoutId = null; }
            if (countdownRAF) { cancelAnimationFrame(countdownRAF); countdownRAF = null; }

            isAlarmActive = true;
            messageBox.classList.add('alarm-state');
            statusMessage.classList.add('alert-message');
            statusMessage.textContent = '¡FACTURA AHORA!';
            canvasContainer.classList.add('alarm-state');

            drawAlarmAnimation();
            playBeeps();
            alarmSoundInterval = setInterval(playBeeps, 2000);
        }

        // Detener alarma y limpiar todo
        function stopAlarm() {
            isAlarmActive = false;
            if (alarmAnimRAF) { cancelAnimationFrame(alarmAnimRAF); alarmAnimRAF = null; }
            if (alarmSoundInterval) { clearInterval(alarmSoundInterval); alarmSoundInterval = null; }
            if (reminderTimeoutId) { clearTimeout(reminderTimeoutId); reminderTimeoutId = null; }
            if (countdownRAF) { cancelAnimationFrame(countdownRAF); countdownRAF = null; }

            messageBox.classList.remove('alarm-state');
            statusMessage.classList.remove('alert-message');
            canvasContainer.classList.remove('alarm-state');
            drawInitialState();
            currentNote = '';
        }

        // Aleatorio entre min y max (inclusive) en ms
        function randomBetween(minMs, maxMs) {
            return Math.floor(Math.random() * (maxMs - minMs + 1)) + minMs;
        }

        // Modo automático: rango real de 5 a 35 minutos
        function scheduleNextReminder() {
            const minTime = 5 * 60 * 1000;   // 5 minutos mínimo
            const maxTime = 35 * 60 * 1000;  // 35 minutos máximo
            const randomTime = randomBetween(minTime, maxTime);
            const mins = Math.floor(randomTime / 60000);
            const secs = Math.floor((randomTime % 60000) / 1000);
            console.log(`Recordatorio programado en ${mins}m ${secs}s`);
            startCountdown(randomTime);
        }

        // Modo manual
        function scheduleManualReminder() {
            const minutes = parseInt(minutesInput.value) || 0;
            const seconds = parseInt(secondsInput.value) || 0;
            currentNote = noteInput.value.trim();
            if (minutes === 0 && seconds === 0) {
                statusMessage.textContent = 'Por favor, introduce un tiempo válido.';
                return;
            }
            startCountdown((minutes * 60 + seconds) * 1000);
        }

        // Countdown basado en Date.now() (sin drift por setInterval)
        function startCountdown(totalTime) {
            stopAlarm();
            stopButton.classList.remove('hidden');

            targetTime = Date.now() + totalTime;
            reminderTimeoutId = setTimeout(triggerAlarm, totalTime);

            function tick() {
                const remaining = Math.max(0, targetTime - Date.now());
                const m = Math.floor(remaining / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                statusMessage.textContent = `Próximo recordatorio en ${m}m ${s}s`;
                drawCountdown(m, s);
                if (remaining > 0) {
                    countdownRAF = requestAnimationFrame(tick);
                }
            }
            tick();
        }

        // Probar sonido (con gain ramp para evitar clicks/pops)
        function playTestSound() {
            try {
                const ac = ensureAudio();
                const t = ac.currentTime;
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.5, t + 0.02);
                gain.gain.setValueAtTime(0.5, t + 0.35);
                gain.gain.linearRampToValueAtTime(0, t + 0.45);
                osc.connect(gain);
                gain.connect(ac.destination);
                osc.start(t);
                osc.stop(t + 0.45);
            } catch (e) {
                console.error('No se pudo reproducir el sonido de prueba.', e);
            }
        }

        // Mostrar controles iniciales según modo
        function showInitialControls() {
            stopButton.classList.add('hidden');
            testSoundButton.classList.remove('hidden');
            toggleModeButton.classList.remove('hidden');
            if (currentMode === 'auto') {
                autoModeControls.classList.remove('hidden');
                manualModeControls.classList.add('hidden');
            } else {
                autoModeControls.classList.add('hidden');
                manualModeControls.classList.remove('hidden');
            }
        }

        function hideInitialControls() {
            autoModeControls.classList.add('hidden');
            manualModeControls.classList.add('hidden');
            toggleModeButton.classList.add('hidden');
            testSoundButton.classList.add('hidden');
            stopButton.classList.remove('hidden');
        }

        // === Eventos ===
        startButton.addEventListener('click', () => {
            currentMode = 'auto';
            hideInitialControls();
            scheduleNextReminder();
        });

        startManualButton.addEventListener('click', () => {
            currentMode = 'manual';
            hideInitialControls();
            scheduleManualReminder();
        });

        stopButton.addEventListener('click', () => {
            const wasAlarming = isAlarmActive;
            stopAlarm();
            // En modo auto: reprogramar automáticamente tras aceptar alarma
            if (wasAlarming && currentMode === 'auto') {
                statusMessage.textContent = 'Reprogramando automáticamente...';
                setTimeout(() => scheduleNextReminder(), 800);
            } else {
                statusMessage.textContent = 'Recordatorio detenido.';
                showInitialControls();
            }
        });

        testSoundButton.addEventListener('click', playTestSound);

        toggleModeButton.addEventListener('click', () => {
            if (currentMode === 'auto') {
                currentMode = 'manual';
                autoModeControls.classList.add('hidden');
                manualModeControls.classList.remove('hidden');
                toggleModeButton.textContent = 'Modo Automático';
            } else {
                currentMode = 'auto';
                autoModeControls.classList.remove('hidden');
                manualModeControls.classList.add('hidden');
                toggleModeButton.textContent = 'Modo Manual';
            }
        });

        drawInitialState();
    </script>
</body>
</html>
